name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macos-latest is Apple Silicon (arm64), matching the osx-arm64 pixi.lock.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true

      - name: Run tests
        run: pixi run test

      - name: Check the example runs against the current API
        run: pixi run check-example
