name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Linux gates; macOS (osx-arm64) and Windows (win-64) are allowed-to-fail bonuses.
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          locked: true

      - name: Run tests
        run: pixi run test

      - name: Check the example runs against the current API
        run: pixi run check-example
